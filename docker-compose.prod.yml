# Production-like local stack: pulls service images from GHCR + brings up dependencies.
#
# Prerequisites:
#   1. CD workflow has run on main, images live at ghcr.io/eaaslan/ecommerce-*:latest
#   2. `docker login ghcr.io -u <github-user> -p <PAT>` (read:packages scope)
#   3. Set host environment vars before `up` if you want to override secrets
#
# Usage:
#   docker compose -f docker-compose.prod.yml up -d
#
# Bring services in startup order: deps first, then config-server, then discovery, then everything else.

x-spring-app-defaults: &spring-app-defaults
  environment:
    SPRING_PROFILES_ACTIVE: docker
    JAVA_TOOL_OPTIONS: "-XX:MaxRAMPercentage=75 -XX:+UseG1GC"
    EUREKA_CLIENT_SERVICE_URL_DEFAULTZONE: http://discovery-server:8761/eureka/
    SPRING_CONFIG_IMPORT: "optional:configserver:http://config-server:8888"
  depends_on:
    config-server:
      condition: service_healthy
    discovery-server:
      condition: service_healthy
  restart: unless-stopped

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: userdb
      POSTGRES_USER: user
      POSTGRES_PASSWORD: pass
    volumes:
      - pg-data:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user"]
      interval: 10s
      retries: 10

  redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      retries: 10

  rabbitmq:
    image: rabbitmq:3-management
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 15s
      retries: 10

  kafka:
    image: bitnami/kafka:3.7
    environment:
      KAFKA_CFG_NODE_ID: "1"
      KAFKA_CFG_PROCESS_ROLES: "controller,broker"
      KAFKA_CFG_CONTROLLER_QUORUM_VOTERS: "1@localhost:9093"
      KAFKA_CFG_LISTENERS: "PLAINTEXT://:9092,CONTROLLER://:9093"
      KAFKA_CFG_ADVERTISED_LISTENERS: "PLAINTEXT://kafka:9092"
      KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP: "PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT"
      KAFKA_CFG_CONTROLLER_LISTENER_NAMES: "CONTROLLER"
      KAFKA_CFG_INTER_BROKER_LISTENER_NAME: "PLAINTEXT"
      KAFKA_CFG_AUTO_CREATE_TOPICS_ENABLE: "true"
      ALLOW_PLAINTEXT_LISTENER: "yes"
    healthcheck:
      test: ["CMD-SHELL", "kafka-topics.sh --bootstrap-server localhost:9092 --list || exit 1"]
      interval: 15s
      retries: 15

  prometheus:
    image: prom/prometheus:v2.55.0
    volumes:
      - ./docker/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro

  grafana:
    image: grafana/grafana:11.3.0
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
    volumes:
      - ./docker/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./docker/grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on: [prometheus]

  zipkin:
    image: openzipkin/zipkin:3

  config-server:
    image: ghcr.io/eaaslan/ecommerce-config-server:${IMAGE_TAG:-latest}
    ports: ["8888:8888"]
    environment:
      SPRING_PROFILES_ACTIVE: docker
      JAVA_TOOL_OPTIONS: "-XX:MaxRAMPercentage=75"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8888/actuator/health/readiness || exit 1"]
      interval: 10s
      retries: 30
    restart: unless-stopped

  discovery-server:
    image: ghcr.io/eaaslan/ecommerce-discovery-server:${IMAGE_TAG:-latest}
    ports: ["8761:8761"]
    environment:
      SPRING_PROFILES_ACTIVE: docker
      JAVA_TOOL_OPTIONS: "-XX:MaxRAMPercentage=75"
      SPRING_CONFIG_IMPORT: "optional:configserver:http://config-server:8888"
    depends_on:
      config-server:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8761/actuator/health/readiness || exit 1"]
      interval: 10s
      retries: 30
    restart: unless-stopped

  api-gateway:
    <<: *spring-app-defaults
    image: ghcr.io/eaaslan/ecommerce-api-gateway:${IMAGE_TAG:-latest}
    ports: ["8080:8080"]
    depends_on:
      config-server: { condition: service_healthy }
      discovery-server: { condition: service_healthy }
      redis: { condition: service_healthy }

  user-service:
    <<: *spring-app-defaults
    image: ghcr.io/eaaslan/ecommerce-user-service:${IMAGE_TAG:-latest}
    depends_on:
      config-server: { condition: service_healthy }
      discovery-server: { condition: service_healthy }
      postgres: { condition: service_healthy }

  product-service:
    <<: *spring-app-defaults
    image: ghcr.io/eaaslan/ecommerce-product-service:${IMAGE_TAG:-latest}
    depends_on:
      config-server: { condition: service_healthy }
      discovery-server: { condition: service_healthy }
      postgres: { condition: service_healthy }

  cart-service:
    <<: *spring-app-defaults
    image: ghcr.io/eaaslan/ecommerce-cart-service:${IMAGE_TAG:-latest}
    depends_on:
      config-server: { condition: service_healthy }
      discovery-server: { condition: service_healthy }
      redis: { condition: service_healthy }

  inventory-service:
    <<: *spring-app-defaults
    image: ghcr.io/eaaslan/ecommerce-inventory-service:${IMAGE_TAG:-latest}
    depends_on:
      config-server: { condition: service_healthy }
      discovery-server: { condition: service_healthy }
      postgres: { condition: service_healthy }

  payment-service:
    <<: *spring-app-defaults
    image: ghcr.io/eaaslan/ecommerce-payment-service:${IMAGE_TAG:-latest}
    depends_on:
      config-server: { condition: service_healthy }
      discovery-server: { condition: service_healthy }
      postgres: { condition: service_healthy }

  order-service:
    <<: *spring-app-defaults
    image: ghcr.io/eaaslan/ecommerce-order-service:${IMAGE_TAG:-latest}
    depends_on:
      config-server: { condition: service_healthy }
      discovery-server: { condition: service_healthy }
      postgres: { condition: service_healthy }
      rabbitmq: { condition: service_healthy }
      kafka: { condition: service_healthy }

  notification-service:
    <<: *spring-app-defaults
    image: ghcr.io/eaaslan/ecommerce-notification-service:${IMAGE_TAG:-latest}
    depends_on:
      config-server: { condition: service_healthy }
      discovery-server: { condition: service_healthy }
      postgres: { condition: service_healthy }
      rabbitmq: { condition: service_healthy }
      kafka: { condition: service_healthy }

  recommendation-service:
    <<: *spring-app-defaults
    image: ghcr.io/eaaslan/ecommerce-recommendation-service:${IMAGE_TAG:-latest}
    depends_on:
      config-server: { condition: service_healthy }
      discovery-server: { condition: service_healthy }

  catalog-stream-service:
    <<: *spring-app-defaults
    image: ghcr.io/eaaslan/ecommerce-catalog-stream-service:${IMAGE_TAG:-latest}
    depends_on:
      config-server: { condition: service_healthy }
      discovery-server: { condition: service_healthy }
      postgres: { condition: service_healthy }

volumes:
  pg-data:
