server:
  port: 8080

spring:
  cloud:
    gateway:
      discovery:
        locator:
          enabled: true
          lower-case-service-id: true
      routes:
        - id: user-service-public
          uri: lb://user-service
          predicates:
            - Path=/api/auth/**
        - id: user-service-protected
          uri: lb://user-service
          predicates:
            - Path=/api/users/**
        - id: product-service
          uri: lb://product-service
          predicates:
            - Path=/api/products/**
        - id: cart-service
          uri: lb://cart-service
          predicates:
            - Path=/api/cart/**
        - id: order-service
          uri: lb://order-service
          predicates:
            - Path=/api/orders/**
        - id: recommendation-service
          uri: lb://recommendation-service
          predicates:
            - Path=/api/recommendations/**
        - id: recommendation-mcp
          uri: lb://recommendation-service
          predicates:
            - Path=/mcp/**
        - id: catalog-stream-service
          uri: lb://catalog-stream-service
          predicates:
            - Path=/api/catalog/**

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/

app:
  jwt:
    secret: ${JWT_SECRET:dev-only-256-bit-key-please-change-this-in-production-environment-now}
