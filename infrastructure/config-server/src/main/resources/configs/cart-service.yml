server:
  port: 8083

spring:
  data:
    redis:
      host: localhost
      port: 6380
      timeout: 2s
      lettuce:
        pool:
          max-active: 16
          max-idle: 8
          min-idle: 0
  cloud:
    openfeign:
      circuitbreaker:
        enabled: true

resilience4j:
  circuitbreaker:
    instances:
      productClient:
        sliding-window-type: COUNT_BASED
        sliding-window-size: 10
        minimum-number-of-calls: 5
        failure-rate-threshold: 50
        wait-duration-in-open-state: 10s
        permitted-number-of-calls-in-half-open-state: 3
        automatic-transition-from-open-to-half-open-enabled: true
        register-health-indicator: true
  retry:
    instances:
      productClient:
        max-attempts: 3
        wait-duration: 200ms
        exponential-backoff-multiplier: 2
        retry-exceptions:
          - feign.RetryableException
          - java.io.IOException
  timelimiter:
    instances:
      productClient:
        timeout-duration: 2s
        cancel-running-future: true

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,refresh,prometheus,circuitbreakers,retries
  health:
    circuitbreakers:
      enabled: true
