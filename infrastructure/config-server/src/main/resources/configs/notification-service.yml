server:
  port: 8087

spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/notificationdb
    username: notification
    password: pass
    hikari:
      maximum-pool-size: 8
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true
        jdbc:
          time_zone: UTC
    open-in-view: false
  flyway:
    enabled: true
    locations: classpath:db/migration
  rabbitmq:
    host: ${RABBIT_HOST:localhost}
    port: ${RABBIT_PORT:5672}
    username: ${RABBIT_USER:guest}
    password: ${RABBIT_PASS:guest}
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP:localhost:9092}
    consumer:
      group-id: notification-service
      auto-offset-reset: earliest
      enable-auto-commit: false
    listener:
      simple:
        acknowledge-mode: auto
        retry:
          enabled: true
          initial-interval: 1s
          max-attempts: 3
          multiplier: 2
          max-interval: 10s
        default-requeue-rejected: false

app:
  rabbit:
    exchange: order.events.exchange
    dlx: order.events.dlx
    queue: notification.order-confirmed.queue
    dlq: notification.order-confirmed.queue.dlq
    routing-key: order.confirmed
  kafka:
    topics:
      order-confirmed: order.confirmed
  slack:
    enabled: ${SLACK_ENABLED:false}
    webhook-url: ${SLACK_WEBHOOK_URL:}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,refresh
