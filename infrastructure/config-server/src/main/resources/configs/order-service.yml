server:
  port: 8086

spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/orderdb
    username: orderusr
    password: pass
    hikari:
      maximum-pool-size: 10
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true
        jdbc:
          time_zone: UTC
    open-in-view: false
  flyway:
    enabled: true
    locations: classpath:db/migration
  cloud:
    openfeign:
      circuitbreaker:
        enabled: true
  rabbitmq:
    host: ${RABBIT_HOST:localhost}
    port: ${RABBIT_PORT:5672}
    username: ${RABBIT_USER:guest}
    password: ${RABBIT_PASS:guest}
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP:localhost:9092}
    producer:
      acks: all

app:
  rabbit:
    exchange: order.events.exchange
    routing-key:
      order-confirmed: order.confirmed
  kafka:
    topics:
      order-confirmed: order.confirmed
  outbox:
    poll-interval-ms: 1000

resilience4j:
  circuitbreaker:
    instances:
      cart-service:
        sliding-window-type: COUNT_BASED
        sliding-window-size: 10
        minimum-number-of-calls: 5
        failure-rate-threshold: 50
        wait-duration-in-open-state: 10s
        permitted-number-of-calls-in-half-open-state: 3
        automatic-transition-from-open-to-half-open-enabled: true
        register-health-indicator: true
      inventory-service:
        sliding-window-type: COUNT_BASED
        sliding-window-size: 10
        minimum-number-of-calls: 5
        failure-rate-threshold: 50
        wait-duration-in-open-state: 10s
        permitted-number-of-calls-in-half-open-state: 3
        register-health-indicator: true
      payment-service:
        sliding-window-type: COUNT_BASED
        sliding-window-size: 10
        minimum-number-of-calls: 5
        failure-rate-threshold: 50
        wait-duration-in-open-state: 10s
        permitted-number-of-calls-in-half-open-state: 3
        register-health-indicator: true
  retry:
    instances:
      cart-service:
        max-attempts: 3
        wait-duration: 200ms
        exponential-backoff-multiplier: 2
        retry-exceptions:
          - feign.RetryableException
          - java.io.IOException
      inventory-service:
        max-attempts: 2
        wait-duration: 200ms
        retry-exceptions:
          - feign.RetryableException
          - java.io.IOException
      payment-service:
        max-attempts: 1
        wait-duration: 0ms
  timelimiter:
    instances:
      cart-service:
        timeout-duration: 3s
        cancel-running-future: true
      inventory-service:
        timeout-duration: 3s
        cancel-running-future: true
      payment-service:
        timeout-duration: 5s
        cancel-running-future: true

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,refresh,circuitbreakers,retries
  health:
    circuitbreakers:
      enabled: true
